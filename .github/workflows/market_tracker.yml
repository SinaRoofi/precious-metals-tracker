name: Gold & Silver Market Tracker

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "اجرا حتی اگه امروز تعطیل تشخیص داده بشه (فقط برای تست)"
        type: boolean
        default: false

concurrency:
  group: market-tracker
  cancel-in-progress: false

jobs:
  track-market:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tehran

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.11
          uv pip install -q -r requirements.txt

      - name: Run Market Tracker
        env:
          FORCE_RUN: ${{ inputs.force_run }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELETHON_API_ID: ${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH: ${{ secrets.TELETHON_API_HASH }}
          SHEETS_SERVICE_ACCOUNT: ${{ secrets.SHEETS_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: .venv/bin/python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: market-tracker-logs
          path: market_tracker.log
